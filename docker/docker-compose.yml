version: "3.9"

services:
  distml-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NUM_WORKERS=4
      - NUM_LAYERS=12
      - HIDDEN_DIM=768
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: distml
      POSTGRES_USER: distml
      POSTGRES_PASSWORD: distml_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
